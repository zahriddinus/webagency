<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />
    <link
      rel="icon"
      type="image/svg"
      sizes="32x32"
      href="./images/http-logo.svg"
    />
    <title>Webagency</title>
  </head>
  <body>
    <!-- HEADER -->

    <header class="header">
      <div class="container header__container">
        <a class="header__link" href="#">
          <img
            class="header__img"
            src="./images/Logo.svg"
            alt="A logo of wensite"
            width="187"
            height="38"
          />
        </a>

        <nav class="header__nav">
          <ul class="header__nav-list">
            <li class="header__nav-item">
              <a class="header__nav-link" href="#">Portfolio</a>
            </li>
            <li class="header__nav-item">
              <a class="header__nav-link" href="#">About Us</a>
            </li>
            <li class="header__nav-item">
              <a class="header__nav-link" href="#">Contact</a>
            </li>
          </ul>

          <button class="main-btn">Order Now</button>
        </nav>

        <button class="header__hamburger"></button>
      </div>
    </header>

    <!-- MAIN -->

    <main>
      <!-- Hero -->

      <section class="hero">
        <div class="container hero__container">
          <div class="hero__left">
            <div class="hero__left-content">
              <h1 class="hero__heading">
                Expand Business <br />
                With a Website
              </h1>
              <p class="hero__desc">
                Far far away, behind the word mountains, far from the countries
                Vokalia and Consonantia, there live the blind texts.
              </p>
            </div>

            <form
              class="hero__form"
              action="https://echo.htmlacademy.ru/"
              method="post"
            >
              <div class="hero__input-wrapper">
                <label for="name" class="visually-hidden">Your Name</label>
                <input
                  class="hero__name"
                  type="text"
                  id="name"
                  name="name"
                  placeholder="Enter Name"
                  required
                  autocomplete="off"
                />

                <label for="website-type" class="visually-hidden"
                  >Website Type</label
                >
                <select
                  class="hero__select"
                  id="website-type"
                  name="website_type"
                  required
                >
                  <option class="hero__option" value="" disabled selected>
                    Website Type
                  </option>
                  <option class="hero__option" value="business">
                    Business
                  </option>
                  <option class="hero__option" value="portfolio">
                    Portfolio
                  </option>
                  <option class="hero__option" value="ecommerce">
                    E-commerce
                  </option>
                  <option class="hero__option" value="blog">Blog</option>
                </select>
              </div>

              <button class="main-btn hero__btn" type="submit">
                Get Started
              </button>
            </form>
          </div>

          <div class="hero__right"></div>
        </div>
      </section>
    </main>

    <script src="./js/script.js"></script>
  </body>
</html>
